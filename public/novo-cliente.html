<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Novo Cliente</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="form-container">
    <h2>Adicionar Novo Cliente</h2>
    <form id="formCliente" class="form-card">
      <div class="form-group">
        <label for="nome">Nome</label>
        <input type="text" id="nome" required>
      </div>

      <div class="form-group">
        <label for="sobrenome">Sobrenome</label>
        <input type="text" id="sobrenome" required>
      </div>

      <div class="form-group">
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" required>
      </div>

      <div class="form-group">
        <label for="telefone">Telefone</label>
        <input type="text" id="telefone" required>
      </div>

      <button type="submit" class="btn-primary">💾 Salvar Cliente</button>
    </form>
  </div>

  <!-- Modal genérico -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span id="modal-close" class="close">&times;</span>
      <h2 id="modal-title"></h2>
      <div id="modal-body"></div>
      <button id="modal-confirm" class="btn-confirm">Confirmar</button>
    </div>
  </div>


  <div id="toast-container"></div>

  <script>

    function mostrarToast(mensagem, tipo="success") {
      const container = document.getElementById("toast-container");
      const toast = document.createElement("div");
      toast.className = `toast ${tipo}`;
      toast.textContent = mensagem;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }
    function apenasDigitos(str) {
  return (str || "").replace(/\D/g, "");
}

   document.addEventListener("DOMContentLoaded", () => {


  function apenasDigitos(str) {
    return (str || "").replace(/\D/g, "");
  }

  function aplicarMascaraCPF(cpf) {
    cpf = apenasDigitos(cpf).slice(0, 11);
    cpf = cpf.replace(/(\d{3})(\d)/, "$1.$2");
    cpf = cpf.replace(/(\d{3})(\d)/, "$1.$2");
    cpf = cpf.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
    return cpf;
  }

  function aplicarMascaraTelefone(tel) {
    tel = apenasDigitos(tel).slice(0, 11);
    tel = tel.replace(/^(\d{2})(\d)/, "($1) $2");
    tel = tel.replace(/(\d{4,5})(\d{4})$/, "$1-$2");
    return tel;
  }

  function validarCPF(cpfRaw) {
    const cpf = apenasDigitos(cpfRaw);
    if (!cpf || cpf.length !== 11) return false;
    if (/^(\d)\1{10}$/.test(cpf)) return false;

    function calcDigito(slice) {
      let soma = 0;
      for (let i = 0; i < slice.length; i++) {
        soma += parseInt(slice.charAt(i), 10) * (slice.length + 1 - i);
      }
      const resto = (soma * 10) % 11;
      return resto === 10 ? 0 : resto;
    }

    const d1 = calcDigito(cpf.slice(0, 9));
    const d2 = calcDigito(cpf.slice(0, 9) + String(d1));
    return d1 === parseInt(cpf.charAt(9), 10) && d2 === parseInt(cpf.charAt(10), 10);
  }

  const cpfInput = document.getElementById("cpf");
  const telInput = document.getElementById("telefone");
  const form = document.getElementById("formCliente");
  const submitBtn = form ? form.querySelector('button[type="submit"]') : null;

  let isSubmitting = false;

    if (cpfInput) {
    cpfInput.addEventListener("input", (e) => {
      const pos = cpfInput.selectionStart;
      const before = cpfInput.value;
      cpfInput.value = aplicarMascaraCPF(cpfInput.value);
      const diff = cpfInput.value.length - before.length;
      cpfInput.selectionStart = cpfInput.selectionEnd = Math.max(0, pos + diff);
    });

    cpfInput.addEventListener("blur", () => {
      const val = cpfInput.value.trim();
      if (val === "") {
        cpfInput.classList.remove("input-invalid");
        return;
      }
      if (!validarCPF(val)) {
        cpfInput.classList.add("input-invalid");
        mostrarToast("CPF inválido", "error");
      } else {
        cpfInput.classList.remove("input-invalid");
      }
    });
  }

  if (telInput) {
    telInput.addEventListener("input", (e) => {
      const pos = telInput.selectionStart;
      const before = telInput.value;
      telInput.value = aplicarMascaraTelefone(telInput.value);
      const diff = telInput.value.length - before.length;
      telInput.selectionStart = telInput.selectionEnd = Math.max(0, pos + diff);
    });
  }

  if (form) {
    form.addEventListener("submit", (e) => {
      e.preventDefault();

      if (isSubmitting) return;
      
      const nome = document.getElementById("nome").value.trim();
      const sobrenome = document.getElementById("sobrenome").value.trim();
      const cpfVal = document.getElementById("cpf").value.trim();
      const telefoneVal = document.getElementById("telefone").value.trim();

      if (!nome || !sobrenome || !cpfVal || !telefoneVal) {
        mostrarToast("Todos os campos são obrigatórios!", "error");
        return;
      }

      if (!validarCPF(cpfVal)) {
        mostrarToast("CPF inválido. Verifique e tente novamente.", "error");
        document.getElementById("cpf").classList.add("input-invalid");
        document.getElementById("cpf").focus();
        return;
      } else {
        document.getElementById("cpf").classList.remove("input-invalid");
      }

      isSubmitting = true;
      if (submitBtn) submitBtn.disabled = true;

      fetch("/clientes", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nome, sobrenome, cpf: cpfVal, telefone: telefoneVal })
      })
      .then(res => {
        if (!res.ok) throw new Error("Erro ao salvar cliente");
        return res.json();
      })
      .then(() => {
        mostrarToast("Cliente cadastrado com sucesso!", "success");
        setTimeout(() => window.location.href = "/index.html", 1200);
      })
      .catch(() => {
        mostrarToast("Erro ao salvar cliente", "error");
      })
      .finally(() => {
        
        isSubmitting = false;
        if (submitBtn) submitBtn.disabled = false;
      });
    });
  }
});

  </script>
</body>
</html>
