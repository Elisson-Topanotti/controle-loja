<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Novo Cliente</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="form-container">
    <h2>✨ Adicionar Novo Cliente</h2>
    <form id="formCliente" class="form-card">
      <div class="form-group">
        <label for="nome">Nome</label>
        <input type="text" id="nome" required>
      </div>

      <div class="form-group">
        <label for="sobrenome">Sobrenome</label>
        <input type="text" id="sobrenome" required>
      </div>

      <div class="form-group">
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" required>
      </div>

      <div class="form-group">
        <label for="telefone">Telefone</label>
        <input type="text" id="telefone" required>
      </div>

      <button type="submit" class="btn-primary">💾 Salvar Cliente</button>
    </form>
  </div>

  <!-- Modal genérico -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span id="modal-close" class="close">&times;</span>
      <h2 id="modal-title"></h2>
      <div id="modal-body"></div>
      <button id="modal-confirm" class="btn-confirm">Confirmar</button>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <script>
    // Função toast
    function mostrarToast(mensagem, tipo="success") {
      const container = document.getElementById("toast-container");
      const toast = document.createElement("div");
      toast.className = `toast ${tipo}`;
      toast.textContent = mensagem;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    // Máscaras CPF e telefone
    function aplicarMascaraCPF(cpf) {
      cpf = cpf.replace(/\D/g, "");
      cpf = cpf.replace(/(\d{3})(\d)/, "$1.$2");
      cpf = cpf.replace(/(\d{3})(\d)/, "$1.$2");
      cpf = cpf.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
      return cpf;
    }

    function aplicarMascaraTelefone(tel) {
      tel = tel.replace(/\D/g, "");
      tel = tel.replace(/^(\d{2})(\d)/g, "($1) $2");
      tel = tel.replace(/(\d{4,5})(\d{4})$/, "$1-$2");
      return tel;
    }

    const cpfInput = document.getElementById("cpf");
    const telInput = document.getElementById("telefone");

    cpfInput.addEventListener("input", () => {
      cpfInput.value = aplicarMascaraCPF(cpfInput.value);
    });

    telInput.addEventListener("input", () => {
      telInput.value = aplicarMascaraTelefone(telInput.value);
    });

    // Envio do formulário
    document.getElementById("formCliente").addEventListener("submit", (e) => {
      e.preventDefault();

      const nome = document.getElementById("nome").value.trim();
      const sobrenome = document.getElementById("sobrenome").value.trim();
      const cpf = document.getElementById("cpf").value.trim();
      const telefone = document.getElementById("telefone").value.trim();

      if (!nome || !sobrenome || !cpf || !telefone) {
        mostrarToast("Todos os campos são obrigatórios!", "error");
        return;
      }

      fetch("/clientes", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nome, sobrenome, cpf, telefone })
      })
      .then(res => {
        if (!res.ok) throw new Error("Erro ao salvar cliente");
        return res.json();
      })
      .then(() => {
        mostrarToast("Cliente cadastrado com sucesso!", "success");
        setTimeout(() => window.location.href = "/index.html", 1500);
      })
      .catch(() => mostrarToast("Erro ao salvar cliente", "error"));
    });
  </script>
</body>
</html>
